
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uploader</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0f0f0f;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.card{
width:100%;
max-width:400px;
background:#1b1b1b;
padding:25px;
border-radius:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.upload-box{
border:2px dashed #444;
padding:30px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
background:#151515;
}

input{
width:100%;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#5865f2;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#151515;
padding:15px;
border-radius:12px;
word-break:break-all;
display:none;
}

a{
color:#4da6ff;
text-decoration:none;
}

img{
width:100%;
margin-top:15px;
border-radius:12px;
}

</style>
</head>
<body>

<div class="card">

<h1>Termai Uploader</h1>

<div class="upload-box">
<input type="file" id="file">
</div>

<button onclick="uploadFile()">Upload</button>

<div class="result" id="result"></div>

</div>

<script src="main.js"></script>
</body>
</html>
